name: Cargo CI

on:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

  build:
    name: Build Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set build version timestamp
        id: version
        run: echo "VERSION=$(date -u '+%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Configure build output directory
        run: |
          mkdir -p .cargo
          printf '[build]\ntarget-dir = "builds"\n' > .cargo/config.toml

      - name: Build release
        run: cargo build --release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.VERSION }}
          path: |
            builds/release/
            !builds/release/.fingerprint
            !builds/release/build
            !builds/release/deps
            !builds/release/incremental
            !builds/release/**/*.d
          if-no-files-found: error

  notify:
    name: Notify Build Failure
    needs: build
    if: ${{ failure() && needs.build.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue for build failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issueBody = [
              `**Cargo release build failed.**`,
              ``,
              `- **Commit:** [\`${context.sha.slice(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})`,
              `- **Branch:** \`${context.ref.replace('refs/heads/', '')}\``,
              `- **Workflow run:** [View logs](${runUrl})`,
            ].join('\n');

            // Apply the 'bug' label only if it already exists in this repo.
            let labels = [];
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'bug' });
              labels = ['bug'];
            } catch (_) {}

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Build failure on ${context.ref.replace('refs/heads/', '')} (${context.sha.slice(0, 7)})`,
              body: issueBody,
              labels,
            });
